<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funcionários</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Cadastro de Funcionários</h2>
    <a class="btn" href="/funcionarios/novo">Novo Funcionário</a>
    <a class="btn-secondary" href="/">Início</a>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>Nome</th><th>Cargo</th><th>Salário</th><th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${funcionarios}">
            <td th:text="${f.id}"></td>
            <td th:text="${f.nome}"></td>
            <td th:text="${f.cargo}"></td>
            <td th:text="${f.salario}"></td>
            <td>
                <a th:href="@{'/funcionarios/editar/' + ${f.id}}">Editar</a>
                <a th:href="@{'/funcionarios/excluir/' + ${f.id}}">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
