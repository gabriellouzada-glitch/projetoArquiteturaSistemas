<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Formulário de Produto</h2>
    <p class="erro" th:if="${erro}" th:text="${erro}"></p>
    <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
        <input type="hidden" th:field="*{id}">
        <label>Nome</label>
        <input type="text" th:field="*{nome}" required>
        <label>Preço</label>
        <input type="number" step="0.01" th:field="*{preco}" required>
        <label>Estoque</label>
        <input type="number" th:field="*{estoque}" required>
        <button class="btn" type="submit">Salvar</button>
        <a class="btn-secondary" href="/produtos">Voltar</a>
    </form>
</div>
</body>
</html>
