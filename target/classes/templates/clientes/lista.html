<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Cadastro de Clientes</h2>
    <a class="btn" href="/clientes/novo">Novo Cliente</a>
    <a class="btn-secondary" href="/">Início</a>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>Nome</th><th>Email</th><th>Telefone</th><th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${clientes}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nome}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.telefone}"></td>
            <td>
                <a th:href="@{'/clientes/editar/' + ${c.id}}">Editar</a>
                <a th:href="@{'/clientes/excluir/' + ${c.id}}">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
