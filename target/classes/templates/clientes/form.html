<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Cliente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Formulário de Cliente</h2>
    <p class="erro" th:if="${erro}" th:text="${erro}"></p>
    <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
        <input type="hidden" th:field="*{id}">
        <label>Nome</label>
        <input type="text" th:field="*{nome}" required>
        <label>Email</label>
        <input type="email" th:field="*{email}" required>
        <label>Telefone</label>
        <input type="text" th:field="*{telefone}" required>
        <button class="btn" type="submit">Salvar</button>
        <a class="btn-secondary" href="/clientes">Voltar</a>
    </form>
</div>
</body>
</html>
